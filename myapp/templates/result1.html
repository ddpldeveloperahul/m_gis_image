
{% extends 'base.html' %}
{% block content %}

<style>
    .page-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        border-radius: 18px;
        padding: 35px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .stat-box {
        padding: 25px;
        border-radius: 12px;
        color: white;
        transition: 0.3s;
    }

    .stat-box:hover {
        transform: translateY(-5px);
    }

    .total { background: linear-gradient(45deg, #6c757d, #495057); }
    .changed { background: linear-gradient(45deg, #28a745, #218838); }
    .unchanged { background: linear-gradient(45deg, #dc3545, #c82333); }

    .btn-custom {
        font-weight: bold;
        padding: 12px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: scale(1.03);
    }

    .title {
        font-weight: 600;
        margin-bottom: 25px;
    }
</style>

<div class="container page-wrapper">
    <div class="col-md-8">

        <div class="card bg-white text-center">

            <h2 class="title">
                🗺️ Spatial Join Result
            </h2>

            <!-- STATS -->
            <div class="row mb-4">

                <div class="col-md-4">
                    <div class="stat-box total">
                        <h5>Total</h5>
                        <h2>{{ result.total }}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="stat-box changed">
                        <h5>Changed</h5>
                        <h2>{{ result.changed }}</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="stat-box unchanged">
                        <h5>Unchanged</h5>
                        <h2>{{ result.unchanged }}</h2>
                    </div>
                </div>

            </div>

            <!-- DOWNLOAD BUTTONS -->
            <div class="d-grid gap-3">

                <a href="/download-excel/?file={{ result.excel }}" class="btn btn-success btn-custom">
                    <i class="bi bi-file-earmark-excel"></i> Download Excel
                </a>

                <a href="/download-shapefile/?file={{ result.shapefile }}" class="btn btn-primary btn-custom">
                    <i class="bi bi-file-earmark-zip"></i> Download Shapefile (ZIP)
                </a>

                <a href="{% url 'result' %}" class="btn btn-outline-secondary">
                    🔄 Run Again
                </a>

            </div>

        </div>

    </div>
</div>

{% endblock %}
