
{% extends 'base.html' %}
{% block content %}

<style>
    .page-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container-custom {
        max-width: 1100px;
    }

    .card {
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .title {
        font-weight: 600;
    }

    .image-wrapper {
        overflow: hidden;
        border-radius: 12px;
        border: 2px solid #ddd;
        background: #f8f9fa;
        padding: 10px;
    }

    .result-img {
        width: 100%;
        max-height: 650px;
        object-fit: contain;
        transition: transform 0.3s ease;
    }

    .btn-custom {
        font-weight: bold;
        padding: 12px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: scale(1.04);
    }

    .zoom-controls button {
        margin: 5px;
    }
</style>

<div class="container page-wrapper">
    <div class="container-custom">

        <div class="card bg-white text-center">

            <h2 class="title mb-2">
                🛰️ Change Detection Result
            </h2>

            <p class="text-muted mb-3">
                Threshold: <strong>0.6</strong>
            </p>

            <!-- IMAGE -->
            <div class="image-wrapper mb-3">
                <img id="zoomImage" src="{{ result_png }}" class="result-img">
            </div>

            <!-- ZOOM CONTROLS -->
            <div class="zoom-controls mb-4">
                <button class="btn btn-outline-dark btn-sm" onclick="zoomIn()">🔍 Zoom In</button>
                <button class="btn btn-outline-dark btn-sm" onclick="zoomOut()">🔎 Zoom Out</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="resetZoom()">♻ Reset</button>
            </div>

            <!-- DOWNLOAD BUTTONS -->
            <div class="d-grid gap-3">

                <a href="{{ result_tif }}" download class="btn btn-success btn-custom">
                    <i class="bi bi-file-earmark-image"></i> Download TIFF
                </a>

                <a href="{{ result_shp }}" download class="btn btn-primary btn-custom">
                    <i class="bi bi-file-earmark-zip"></i> Download Shapefile (ZIP)
                </a>

            </div>

            <!-- NAVIGATION -->
            <div class="mt-4">
                <a href="/" class="btn btn-outline-dark me-2">
                    🔄 Upload Again
                </a>

                <a href="{% url 'result' %}" class="btn btn-outline-secondary">
                    🔗 Go to Spatial Join
                </a>
            </div>

        </div>

    </div>
</div>

<!-- ZOOM SCRIPT -->
<script>
    let scale = 1;

    function zoomIn() {
        scale += 0.2;
        document.getElementById("zoomImage").style.transform = `scale(${scale})`;
    }

    function zoomOut() {
        if (scale > 0.4) {
            scale -= 0.2;
            document.getElementById("zoomImage").style.transform = `scale(${scale})`;
        }
    }

    function resetZoom() {
        scale = 1;
        document.getElementById("zoomImage").style.transform = "scale(1)";
    }
</script>

{% endblock %}
