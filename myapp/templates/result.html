{% extends 'base.html' %}
{% block content %}

<style>
    /* MAIN LAYOUT & CARD STYLING */
    .page-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f4f6f9;
        padding: 20px;
    }

    .container-custom {
        max-width: 900px; 
        width: 100%;
    }

    .card {
        border-radius: 12px;
        padding: 25px 35px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        border: 1px solid #eaeaea;
    }

    .title {
        font-weight: 600;
        font-size: 1.75rem;
        color: #2c3e50;
    }

    /* IMAGE WRAPPER */
    .image-wrapper {
        position: relative;
        width: 100%;
        height: 500px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #f8f9fa;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; 
    }

    .result-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: transform 0.2s ease-in-out;
    }

    /* BUTTONS STYLING */
    .btn-custom {
        font-weight: 600;
        padding: 12px;
        border-radius: 6px;
        font-size: 1rem;
    }

    .zoom-controls {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px; 
    }
    
    .zoom-controls .btn {
        font-size: 0.85rem;
        padding: 6px 14px;
        font-weight: 500;
        border-radius: 4px;
    }

    .bottom-links .btn {
        font-size: 0.9rem;
        padding: 6px 20px;
        color: #555;
        border-color: #ccc;
    }

    /* DISABLE TEXT SELECTION WHILE DRAGGING */
    .no-select {
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
    }
</style>

<div class="page-wrapper">
    <div class="container-custom">
        <div class="card bg-white text-center">

            <h2 class="title mb-1">
                🛰️ Change Detection Result
            </h2>

            <p class="text-muted mb-3" style="font-size: 0.9rem;">
                Threshold: <strong class="text-dark">0.6</strong>
            </p>

            <div class="image-wrapper mb-4 no-select" id="wrapper">
                
                <img id="zoomImage" src="{{ result_png }}" class="result-img">

                <div id="compareBox" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%;">
                    
                    <img src="{{ img23 }}" class="result-img" style="position:absolute; top:0; left:0; width:100%; height:100%; padding: 10px;">

                    <img id="frontImgCompare" src="{{ img25 }}" class="result-img" style="position:absolute; top:0; left:0; width:100%; height:100%; padding: 10px; clip-path: inset(0 0 50% 0);">

                    <div id="sliderLine" style="
                        position:absolute;
                        left:0;
                        top: 50%;
                        height: 3px;
                        width: 100%;
                        background: #dc3545;
                        cursor: ns-resize;
                        z-index: 10;
                    "></div>
                </div>
            </div>

            <div class="zoom-controls mb-4">
                <button class="btn btn-outline-dark" onclick="zoomIn()">🔍 Zoom In</button>
                <button class="btn btn-outline-dark" onclick="zoomOut()">🔎 Zoom Out</button>
                <button class="btn btn-outline-secondary" onclick="resetZoom()">♻️ Reset</button>
                
                <span class="mx-2"></span> <button class="btn btn-outline-primary" onclick="showBack()">🟦 Back Image</button>
                <button class="btn btn-outline-success" onclick="showFront()">🟩 Front Image</button>
                <button class="btn btn-dark" onclick="startCompare()">🔥 Compare</button>
            </div>

            <div class="d-grid gap-2 mb-4">
                <a href="{{ result_tif }}" download class="btn btn-success btn-custom">
                    Download TIFF
                </a>
                <a href="{{ result_shp }}" download class="btn btn-primary btn-custom">
                    Download Shapefile (ZIP)
                </a>
            </div>

            <div class="bottom-links d-flex justify-content-center gap-3 mt-2">
                <a href="/" class="btn btn-outline-secondary">
                    🔄 Upload Again
                </a>
                <a href="{% url 'spatial_join' %}?file={{ result_shp }}" class="btn btn-outline-secondary">
                    🔗 Go to Spatial Join
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    let scale = 1;

    // Django Variables
    const backImg = "{{ img23 }}";
    const frontImg = "{{ img25 }}";

    // Elements
    const zoomImage = document.getElementById("zoomImage");
    const compareBox = document.getElementById("compareBox");
    const frontImgCompare = document.getElementById("frontImgCompare");
    const sliderLine = document.getElementById("sliderLine");
    const wrapper = document.getElementById("wrapper");

    // --- ZOOM LOGIC ---
    function zoomIn() {
        if(compareBox.style.display === "block") return; // Disable zoom during compare
        scale += 0.2;
        zoomImage.style.transform = `scale(${scale})`;
    }

    function zoomOut() {
        if(compareBox.style.display === "block") return;
        if (scale > 0.4) {
            scale -= 0.2;
            zoomImage.style.transform = `scale(${scale})`;
        }
    }

    function resetZoom() {
        scale = 1;
        zoomImage.style.transform = "scale(1)";
    }

    // --- BUTTON TOGGLES ---
    function showBack() {
        compareBox.style.display = "none";
        zoomImage.style.display = "block";
        zoomImage.src = backImg;
        resetZoom();
    }

    function showFront() {
        compareBox.style.display = "none";
        zoomImage.style.display = "block";
        zoomImage.src = frontImg;
        resetZoom();
    }

    function startCompare() {
        zoomImage.style.display = "none";
        compareBox.style.display = "block";
        resetZoom(); // Ensure no zoom interference
        
        // Default position (Center)
        let height = wrapper.offsetHeight / 2;
        updateSlider(height);
    }

    // --- COMPARE SLIDER LOGIC ---
    let isDragging = false;

    function updateSlider(y) {
        let rect = wrapper.getBoundingClientRect();
        // Constrain Y inside the box
        let pos = Math.max(0, Math.min(y, rect.height));
        
        // Calculate percentage from top
        let percentage = (pos / rect.height) * 100;

        // Apply Clip Path: inset(top right bottom left)
        // We crop from the bottom up to the slider position
        frontImgCompare.style.clipPath = `inset(0 0 ${100 - percentage}% 0)`;
        
        // Move the red line
        sliderLine.style.top = pos + "px";
    }

    // Mouse Events for dragging
    wrapper.addEventListener("mousedown", (e) => {
        if (compareBox.style.display !== "block") return;
        isDragging = true;
        let rect = wrapper.getBoundingClientRect();
        let y = e.clientY - rect.top;
        updateSlider(y);
    });

    window.addEventListener("mouseup", () => {
        isDragging = false;
    });

    window.addEventListener("mousemove", (e) => {
        if (!isDragging || compareBox.style.display !== "block") return;
        let rect = wrapper.getBoundingClientRect();
        let y = e.clientY - rect.top;
        updateSlider(y);
    });

</script>

{% endblock %}
