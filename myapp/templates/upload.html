{% extends 'base.html' %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/resumablejs/resumable.js"></script>

<style>

/* ===== MODERN GLASS UI ===== */
.upload-container {
    max-width: 1000px;
    margin: 60px auto;
    padding: 20px;
}

.upload-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}

/* ===== DROPZONE ===== */
.dropzone {
    border: 2px dashed #cbd5e1;
    border-radius: 20px;
    padding: 50px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
}

.dropzone:hover {
    border-color: #1677ff;
    transform: translateY(-3px);
}

.dropzone.dragover {
    border-color: #00b98c;
    background: rgba(0,185,140,0.1);
    transform: scale(1.03);
    box-shadow: 0 10px 40px rgba(0,185,140,0.3);
}

/* glow effect */
.dropzone::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(22,119,255,0.2), transparent);
    opacity: 0;
    transition: 0.4s;
}

.dropzone.dragover::after {
    opacity: 1;
}

/* ===== FILE NAME ===== */
.file-name {
    margin-top: 12px;
    font-weight: 600;
    color: #0c4a6e;
}

/* ===== BUTTON ===== */
.upload-btn {
    margin-top: 30px;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg,#1677ff,#00b98c);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.upload-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(22,119,255,0.4);
}

/* ===== PROGRESS ===== */
.progress-wrapper {
    margin-top: 25px;
    display: none;
}

.progress-bar {
    width: 100%;
    height: 12px;
    background: #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(135deg,#1677ff,#00b98c);
    transition: 0.3s;
}

.progress-text {
    margin-top: 10px;
    font-weight: 600;
    text-align: center;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

</style>

<div class="upload-container">

<div class="upload-card">
{% csrf_token %}

<div class="grid">

<!-- FILE 1 -->
<div class="dropzone" id="zone1">
    <h3>📸 Old Image</h3>
    <p>Drag & Drop or Click</p>
    <input type="file" id="file1" hidden>
    <div id="name1" class="file-name"></div>
</div>

<!-- FILE 2 -->
<div class="dropzone" id="zone2">
    <h3>🗺️ New Image</h3>
    <p>Drag & Drop or Click</p>
    <input type="file" id="file2" hidden>
    <div id="name2" class="file-name"></div>
</div>

</div>

<button class="upload-btn" onclick="startUpload()" id="btn">
🚀 Start Upload
</button>

<div class="progress-wrapper" id="progressWrap">
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
</div>

</div>
</div>

<script>

// ===== DRAG DROP =====
function setupDrop(zoneId, fileId, nameId) {

    let zone = document.getElementById(zoneId);
    let input = document.getElementById(fileId);

    zone.onclick = () => input.click();

    zone.ondragover = (e) => {
        e.preventDefault();
        zone.classList.add("dragover");
    };

    zone.ondragleave = () => zone.classList.remove("dragover");

    zone.ondrop = (e) => {
        e.preventDefault();
        zone.classList.remove("dragover");

        input.files = e.dataTransfer.files;
        showName(input, nameId);
    };

    input.onchange = () => showName(input, nameId);
}

function showName(input, id) {
    document.getElementById(id).innerHTML = input.files[0].name;
}

setupDrop("zone1","file1","name1");
setupDrop("zone2","file2","name2");


// ===== UPLOAD =====
// ===== UPLOAD =====
async function startUpload() {

    let f1 = document.getElementById("file1").files[0];
    let f2 = document.getElementById("file2").files[0];

    if(!f1 || !f2){
        alert("Select both files");
        return;
    }

    document.getElementById("progressWrap").style.display="block";
    document.getElementById("progressText").innerHTML = "Uploading...";

    try {
        // Upload both files
        const file1_path = await simpleUpload(f1);
        document.getElementById("progressFill").style.width = "50%";
        
        const file2_path = await simpleUpload(f2);
        document.getElementById("progressFill").style.width = "100%";
        
        console.log("Both files uploaded:", file1_path, file2_path);
        
        // Now process
        document.getElementById("progressText").innerHTML = "Processing...";
        
        const response = await fetch('/start-processing/', {
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'X-CSRFToken': getCSRF()
            },
            body:JSON.stringify({
                file1: file1_path,
                file2: file2_path
            })
        });
        
        const result = await response.json();
        console.log("Start processing response:", result);
        
        if (!response.ok) {
            throw new Error(result.error || 'Processing failed');
        }
        
        if (result.status === "SUCCESS" && result.result && result.result.id) {
            window.location.href = "/result/?id=" + result.result.id;
            return;
        }

        checkStatus(result.task_id);
        
    } catch (error) {
        console.error("Upload/processing error:", error);
        alert("Error: " + error.message);
        document.getElementById("progressWrap").style.display = "none";
    }
}


// ===== SIMPLE UPLOAD (FALLBACK) =====
async function simpleUpload(file) {
    const formData = new FormData();
    formData.append('file', file);
    
    try {
        const response = await fetch('/upload-chunk/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': getCSRF()
            }
        });
        
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || 'Upload failed');
        }
        return data.file_path;
    } catch (error) {
        console.error('Simple upload failed:', error);
        throw error;
    }
}


// ===== STATUS =====
function checkStatus(id){

    let i=setInterval(()=>{

        fetch('/task-status/'+id+'/')
        .then(r=>r.json())
        .then(d=>{
            if(d.status==="SUCCESS"){
                clearInterval(i);
                window.location.href="/result/?id="+d.result.id;
            }
        });

    },4000);
}


// ===== CSRF =====
function getCSRF(){
    const tokenInput = document.querySelector('[name=csrfmiddlewaretoken]');
    if (tokenInput) {
        return tokenInput.value;
    }

    const cookieMatch = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
    return cookieMatch ? decodeURIComponent(cookieMatch[1]) : "";
}

</script>

{% endblock %}
