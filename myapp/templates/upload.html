<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Change Detection</title>

    <style>
        body {
            background: linear-gradient(135deg, #28457c, #212630);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-box {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: #007bff;
            background: #f8f9fa;
        }

        .btn-custom {
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4">
                <h3 class="text-center mb-4">🛰️ Change Detection</h3>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Before -->
                    <div class="mb-3">

                        <select name="year1" id="year1" class="form-select mb-2">
                            <option value="">Select Year (Before)</option>
                            {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                            {% endfor %}
                        </select>

                        <div class="upload-box">
                            {{ form.uploaded_2023 }}
                        </div>

                    </div>

                    <!-- After -->
                    <div class="mb-3">

                        <select name="year2" id="year2" class="form-select mb-2">
                            <option value="">Select Year (After)</option>
                            {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                            {% endfor %}
                        </select>

                        <div class="upload-box">
                            {{ form.uploaded_2025 }}
                        </div>

                    </div>

                    <!-- Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom">
                            🚀 Run Change Detection
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

<!-- ✅ JS yahi same file me -->
<script>
    const year1 = document.getElementById("year1");
    const year2 = document.getElementById("year2");

    const file1 = document.querySelector('input[name="uploaded_2023"]');
    const file2 = document.querySelector('input[name="uploaded_2025"]');

    // Page load pe disable
    file1.disabled = true;
    file2.disabled = true;

    // Before year change
    year1.addEventListener("change", function () {
        if (this.value !== "") {
            file1.disabled = false;
        } else {
            file1.disabled = true;
            file1.value = "";
        }
    });

    // After year change
    year2.addEventListener("change", function () {
        if (this.value !== "") {
            file2.disabled = false;
        } else {
            file2.disabled = true;
            file2.value = "";
        }
    });
</script>

</body>
</html>
