<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>GIS Project</title>
</head>

<body style="background:#1f2a44;">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="/">🌍 GIS Tool</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Change Detection</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/spatial-join/">Spatial Join</a>
                </li>
            </ul>

            <!-- RIGHT SIDE -->
            <div class="d-flex align-items-center gap-2">

                {% if request.user.is_authenticated %}
                    
                    <!-- USER -->
                    <span class="text-white me-2">
                        👤 {{ request.user.username }}
                    </span>

                    <!-- LOGOUT -->
                    <form method="post" action="/api/logout/">
                        {% csrf_token %}
                        <button class="btn btn-danger btn-sm">Logout</button>
                    </form>

                {% else %}

                    <!-- LOGIN -->
                    <a href="/login/" class="btn btn-outline-light btn-sm">Login</a>

                    <!-- SIGNUP -->
                    <a href="/signup/" class="btn btn-primary btn-sm">Signup</a>

                {% endif %}

            </div>

        </div>
    </div>
</nav>

<!-- 🔥 MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
