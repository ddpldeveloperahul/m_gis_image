{% extends 'base.html' %}

{% block content %}

<style>
    .page-wrapper {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        border-radius: 18px;
        padding: 40px;
        width: 500px;   /* 🔥 increased width */
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .upload-box {
        border: 2px dashed #bbb;
        border-radius: 12px;
        padding: 35px;   /* 🔥 bigger box */
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .upload-box:hover {
        border-color: #0d6efd;
        background: #f1f5ff;
    }

    .upload-box input {
        margin-top: 10px;
    }

    .file-name {
        font-size: 14px;
        color: green;
        margin-top: 8px;
    }

    .btn-run {
        background: linear-gradient(45deg, #0d6efd, #2563eb);
        color: white;
        font-weight: bold;
        padding: 12px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .btn-run:hover {
        background: #0b5ed7;
        transform: scale(1.02);
    }

    .title {
        font-weight: 600;
        margin-bottom: 25px;
    }
</style>

<div class="container page-wrapper">
    <div class="card bg-white">

        <h3 class="text-center title">
            🗺️ Spatial Join Tool
        </h3>

        <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {% if prefilled_file %}
        <p class="text-success">✅ Auto Loaded: {{ file_name }}</p>
        <input type="hidden" name="prefilled_file" value="{{ prefilled_file }}">
    {% else %}
        <label>Change Shapefile</label>
        <input type="file" name="change_zip" class="form-control">
    {% endif %}

    <label>Old Shapefile</label>
    <input type="file" name="main_zip" class="form-control">

    <button type="submit">Run Spatial Join</button>
</form>

    </div>
</div>

<script>
    document.getElementById("mainFile").onchange = function () {
        document.getElementById("mainName").innerText = this.files[0].name;
    };

    document.getElementById("changeFile").onchange = function () {
        document.getElementById("changeName").innerText = this.files[0].name;
    };
</script>

{% endblock %}
